<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EFF6FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FAF5FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9333EA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative blobs -->
  <circle cx="150" cy="150" r="200" fill="#DBEAFE" opacity="0.3"/>
  <circle cx="1050" cy="480" r="180" fill="#F3E8FF" opacity="0.3"/>
  
  <!-- Logo -->
  <text x="600" y="200" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="#111827" text-anchor="middle">
    ai.<tspan fill="url(#text-grad)">gesti</tspan>.ro
  </text>
  
  <!-- Tagline -->
  <text x="600" y="300" font-family="Arial, sans-serif" font-size="36" fill="#374151" text-anchor="middle">
    Primul angajat virtual care nu costă un salariu
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="360" font-family="Arial, sans-serif" font-size="28" fill="#6B7280" text-anchor="middle">
    Procesează facturi prin WhatsApp • Agenți AI • gesti.ro ERP
  </text>
  
  <!-- Icons -->
  <text x="450" y="480" font-size="60">🤖</text>
  <text x="550" y="480" font-size="60">💬</text>
  <text x="650" y="480" font-size="60">📄</text>
  
  <!-- Footer badge -->
  <rect x="470" y="540" width="260" height="50" rx="25" fill="#2563EB"/>
  <text x="600" y="575" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">
    🇷🇴 Produs în România
  </text>
</svg>
